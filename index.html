<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blockchain, Built From Scratch · An Interactive Course</title>
  <link rel="stylesheet" href="css/app.css?v=2" />
</head>
<body>
  <div id="app">
    <!-- ============ SIDEBAR ============ -->
    <aside id="sidebar">
      <div class="brand">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="7" height="7" rx="1.6" stroke="#fff" stroke-width="1.6"/>
            <rect x="14" y="14" width="7" height="7" rx="1.6" stroke="#fff" stroke-width="1.6"/>
            <path d="M10 6.5h2.5A1.5 1.5 0 0 1 14 8v6" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="t">Blockchain, from scratch</div>
          <div class="s">Zero → ultra-technical</div>
        </div>
      </div>

      <div class="course-progress">
        <div class="bar"><i id="cpBar"></i></div>
        <div class="lbl" id="cpLbl">0 / 15 lessons · 0%</div>
      </div>

      <nav id="lessonList"></nav>

      <div style="margin-top:auto;padding:12px 8px 4px">
        <button class="topbtn" id="resetBtn" style="width:100%">↺ Reset progress</button>
      </div>
    </aside>

    <!-- ============ MAIN ============ -->
    <main id="main">
      <header id="topbar">
        <div class="crumb" id="crumb"></div>
        <div style="display:flex;align-items:center;gap:14px">
          <span class="pct" id="topPct">0%</span>
        </div>
      </header>

      <div id="stage"></div>

      <footer id="lessonNav">
        <button class="navbtn" id="prevBtn">← Previous</button>
        <span class="pct" style="color:var(--faint)">Use ← → arrow keys to navigate</span>
        <button class="navbtn next" id="nextBtn">Next lesson →</button>
      </footer>
    </main>
  </div>

  <script src="js/sha256.js?v=2"></script>
  <script src="js/engine.js?v=2"></script>
  <script src="js/ui.js?v=2"></script>
  <script src="js/lessons.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
